name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    outputs:
      sha256:  ${{ steps.package.outputs.sha256 }}
      version: ${{ steps.package.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DPING4_VERSION=${GITHUB_REF_NAME#v}

      - name: Build
        run: cmake --build build

      - name: Strip binary
        run: strip build/ping4

      - name: Package
        id: package
        run: |
          VERSION=${GITHUB_REF_NAME}
          tar -czf ping4-${VERSION}-macos.tar.gz -C build ping4
          echo "TARBALL=ping4-${VERSION}-macos.tar.gz" >> $GITHUB_ENV
          echo "sha256=$(shasum -a 256 ping4-${VERSION}-macos.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TARBALL }}
          generate_release_notes: true

  update-formula:
    needs: release
    runs-on: macos-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-ping4
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update formula
        run: |
          VERSION=${GITHUB_REF_NAME}
          sed -i '' \
            "s|url \".*\"|url \"https://github.com/${{ github.repository }}/releases/download/${VERSION}/ping4-${VERSION}-macos.tar.gz\"|" \
            Formula/ping4.rb
          sed -i '' \
            "s|sha256 \".*\"|sha256 \"${{ needs.release.outputs.sha256 }}\"|" \
            Formula/ping4.rb
          sed -i '' \
            "s|version \".*\"|version \"${{ needs.release.outputs.version }}\"|" \
            Formula/ping4.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ping4.rb
          git commit -m "ping4 ${GITHUB_REF_NAME}"
          git push
